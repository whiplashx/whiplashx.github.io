<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Josh Neiel C. Manalo |  Portfolio</title>
    <style>
        :root {
            --bg: #000000;
            --panel: rgba(3, 12, 6, 0.86);
            --panel-strong: rgba(5, 20, 10, 0.96);
            --line: rgba(70, 255, 120, 0.2);
            --green: #33ff5e;
            --green-deep: #1c9e3c;
            --green-soft: #b6ffca;
            --accent: #ffcf6b;
            --text: #d3ffe0;
            --muted: #7da78a;
            --danger: #ff6b6b;
            --warning: #ffd166;
            --shadow: 0 0 18px rgba(51, 255, 94, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            min-height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "JetBrains Mono", "Courier New", Courier, monospace;
            overflow: hidden;
            text-rendering: optimizeLegibility;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        body::before {
            background: linear-gradient(rgba(255, 255, 255, 0.03) 50%, transparent 50%);
            background-size: 100% 4px;
            opacity: 0.09;
            mix-blend-mode: screen;
        }

        body::after {
            background: radial-gradient(circle at center, transparent 35%, rgba(0, 0, 0, 0.72) 100%);
        }

        #matrix {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: block;
            background: radial-gradient(circle at top, rgba(28, 158, 60, 0.1), transparent 40%);
        }

        .shell {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem 1rem;
        }

        .terminal {
            width: min(1100px, 100%);
            height: min(92vh, 980px);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(102, 255, 153, 0.2);
            border-radius: 18px;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(4, 16, 8, 0.82), rgba(1, 7, 3, 0.94));
            box-shadow: 0 0 0 1px rgba(51, 255, 94, 0.08), 0 25px 80px rgba(0, 0, 0, 0.7), var(--shadow);
            backdrop-filter: blur(8px);
        }

        .terminal.hackermode {
            --green: #ff4d4d;
            --green-deep: #a61f1f;
            --green-soft: #ffd1d1;
            --accent: #ffd166;
            --shadow: 0 0 18px rgba(255, 77, 77, 0.2);
        }

        .chrome {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.85rem 1rem;
            background: rgba(1, 7, 3, 0.92);
            border-bottom: 1px solid var(--line);
        }

        .dots {
            display: flex;
            gap: 0.45rem;
            align-items: center;
            min-width: 74px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 999px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
        }

        .dot.red { background: #ff5f57; }
        .dot.yellow { background: #febc2e; }
        .dot.green { background: #28c840; }

        .chrome-title {
            color: var(--green-soft);
            font-size: 0.82rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            opacity: 0.95;
            text-align: center;
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .chrome-status {
            min-width: 74px;
            text-align: right;
            color: var(--accent);
            font-size: 0.76rem;
            letter-spacing: 0.08em;
        }

        .terminal-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .output {
            flex: 1;
            overflow: auto;
            padding: 1.3rem 1.2rem 1rem;
            scrollbar-color: rgba(51, 255, 94, 0.45) transparent;
            scrollbar-width: thin;
        }

        .output::-webkit-scrollbar {
            width: 10px;
        }

        .output::-webkit-scrollbar-thumb {
            background: rgba(51, 255, 94, 0.3);
            border-radius: 999px;
        }

        .line {
            margin-bottom: 0.7rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .line.muted { color: var(--muted); }
        .line.green { color: var(--green); text-shadow: 0 0 8px rgba(51, 255, 94, 0.26); }
        .line.soft { color: var(--green-soft); }
        .line.accent { color: var(--accent); }
        .line.warn { color: var(--warning); }
        .line.danger { color: var(--danger); }

        .banner {
            color: var(--green-soft);
            text-shadow: 0 0 8px rgba(182, 255, 202, 0.22), 0 0 18px rgba(51, 255, 94, 0.15);
            font-size: clamp(0.62rem, 1.3vw, 0.88rem);
            letter-spacing: 0.05em;
            line-height: 1.2;
            margin-bottom: 1rem;
            white-space: pre;
            overflow-x: auto;
        }

        .welcome {
            display: grid;
            gap: 0.35rem;
            margin-bottom: 1rem;
        }

        .welcome strong {
            color: var(--green-soft);
        }

        .cards {
            display: grid;
            gap: 0.9rem;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            margin: 0.85rem 0 0.3rem;
        }

        .card {
            border: 1px solid rgba(51, 255, 94, 0.16);
            background: rgba(3, 14, 7, 0.6);
            border-radius: 12px;
            padding: 0.9rem 1rem;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
        }

        .card-title {
            margin-bottom: 0.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.78rem;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-top: 0.5rem;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 0.22rem 0.55rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 207, 107, 0.35);
            background: rgba(255, 207, 107, 0.08);
            color: var(--accent);
            font-size: 0.72rem;
        }

        .project-list,
        .history-list {
            display: grid;
            gap: 0.75rem;
        }

        .project {
            border-left: 2px solid rgba(51, 255, 94, 0.3);
            padding: 0.7rem 0.9rem 0.7rem 1rem;
            background: rgba(4, 16, 8, 0.32);
            border-radius: 0 10px 10px 0;
        }

        .project-head {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 0.7rem;
            align-items: baseline;
            margin-bottom: 0.35rem;
        }

        .project-name {
            color: var(--green-soft);
            font-weight: 700;
        }

        .project-meta {
            color: var(--muted);
            font-size: 0.88rem;
        }

        .project-desc,
        .history-item,
        .contact-row,
        .help-grid,
        .details-list,
        .skills-grid {
            color: #cae9d0;
        }

        .project-link,
        .contact-link,
        .help-link {
            color: var(--green);
            text-decoration: none;
            border-bottom: 1px dotted rgba(51, 255, 94, 0.35);
        }

        .project-link:hover,
        .contact-link:hover,
        .help-link:hover {
            color: #ffffff;
            border-bottom-color: rgba(255, 255, 255, 0.7);
        }

        .help-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.5rem 0.9rem;
            margin-top: 0.55rem;
        }

        .help-item {
            appearance: none;
            border: 1px solid rgba(51, 255, 94, 0.14);
            border-radius: 10px;
            background: rgba(3, 14, 7, 0.42);
            color: inherit;
            text-align: left;
            font: inherit;
            cursor: pointer;
            padding: 0.45rem 0.6rem;
        }

        .help-item:hover {
            border-color: rgba(51, 255, 94, 0.35);
            background: rgba(6, 22, 11, 0.62);
        }

        .help-item code,
        .command-chip {
            color: var(--accent);
            font-size: 0.92em;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.8rem;
        }

        .skills-group {
            padding: 0.85rem 0.9rem;
            border: 1px solid rgba(51, 255, 94, 0.16);
            border-radius: 12px;
            background: rgba(3, 14, 7, 0.55);
        }

        .skills-label {
            color: var(--green-soft);
            margin-bottom: 0.45rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.74rem;
        }

        .skills-list,
        .details-list,
        .history-list,
        .contact-list {
            list-style: none;
            display: grid;
            gap: 0.45rem;
        }

        .details-list li::before,
        .skills-list li::before,
        .history-list li::before,
        .contact-list li::before {
            content: "> ";
            color: var(--green);
        }

        .split {
            display: grid;
            gap: 0.9rem;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        }

        .section {
            margin-bottom: 1rem;
        }

        .section-title {
            color: var(--green-soft);
            text-transform: uppercase;
            letter-spacing: 0.14em;
            margin-bottom: 0.7rem;
            font-size: 0.82rem;
        }

        .command-line {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.92rem 1rem;
            border-top: 1px solid var(--line);
            background: rgba(1, 7, 3, 0.94);
        }

        .prompt {
            color: var(--green);
            white-space: nowrap;
            text-shadow: 0 0 8px rgba(51, 255, 94, 0.35);
        }

        .command-input {
            flex: 1;
            min-width: 0;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--green-soft);
            font: inherit;
            caret-color: var(--green-soft);
        }

        .caret-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            flex: 1;
            min-width: 0;
        }

        .caret {
            pointer-events: none;
            display: none;
        }

        .command-input::placeholder {
            color: rgba(182, 255, 202, 0.35);
        }

        .input-hint {
            color: var(--muted);
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .blip {
            color: var(--accent);
        }

        .terminal a {
            color: inherit;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .line,
        .project,
        .card,
        .help-item,
        .skills-group {
            animation: fadeInUp 0.35s ease both;
        }

        @media (max-width: 780px) {
            .shell {
                padding: 0;
            }

            .terminal {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                border-left: 0;
                border-right: 0;
            }

            .chrome {
                gap: 0.5rem;
                padding: 0.75rem 0.85rem;
            }

            .chrome-title {
                font-size: 0.72rem;
            }

            .chrome-status {
                display: none;
            }

            .output {
                padding: 1rem 0.9rem 0.9rem;
            }

            .command-line {
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .input-hint {
                width: 100%;
                white-space: normal;
            }

            .banner {
                font-size: 0.6rem;
            }
        }
    </style>
</head>

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;");
        }

        function scrollToBottom() {
            output.scrollTop = output.scrollHeight;
        }

        function appendLine(html, className = "line") {
            const node = document.createElement("div");
            node.className = className;
            node.innerHTML = html;
            output.appendChild(node);
            scrollToBottom();
            return node;
        }

        function appendBlock(className, innerHTML) {
            const node = document.createElement("div");
            node.className = className;
            node.innerHTML = innerHTML;
            output.appendChild(node);
            scrollToBottom();
            return node;
        }

            const commands = profile.commands.map((command) => {
                const alias = command.alias ? ` <span class="muted">[alias: ${escapeHtml(command.alias)}]</span>` : "";
                const note = command.note ? `<div class="muted">${escapeHtml(command.note)}</div>` : "";
                return `<button type="button" class="help-item" data-command="${escapeHtml(command.label)}"><code>${escapeHtml(command.label)}</code>${alias}${note}</button>`;
            }).join("");

            appendBlock("line", `
                <div class="section-title">available commands</div>
                <div class="help-grid">${commands}</div>
                <div class="line muted" style="margin-top:0.85rem;">Tip: use <span class="command-chip">projects &lt;number&gt;</span> for full project details.</div>
            `);
        }

        function renderAbout() {
            appendBlock("line", `
                <div class="section-title">about</div>
                <div class="cards">
                    <div class="card">
                        <div class="card-title">identity</div>
                        <div class="details-list">
                            <li>${escapeHtml(profile.person.name)}</li>
                            <li>${escapeHtml(profile.person.title)}</li>
                            <li>${escapeHtml(profile.person.location)}</li>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title">summary</div>
                        <div>${escapeHtml(profile.person.summary)}</div>
                    </div>
                </div>
            `);
        }

        function renderSkills() {
            const groups = Object.entries(profile.skills).map(([label, items]) => `
                <div class="skills-group">
                    <div class="skills-label">${escapeHtml(label)}</div>
                    <ul class="skills-list">
                        ${items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
                    </ul>
                </div>
            `).join("");

            appendBlock("line", `
                <div class="section-title">skills</div>
                <div class="skills-grid">${groups}</div>
            `);
        }

        function renderExperience() {
            const items = profile.experience.map((entry) => `
                <div class="project">
                    <div class="project-head">
                        <div class="project-name">${escapeHtml(entry.title)}</div>
                        <div class="project-meta">${escapeHtml(entry.company)} · ${escapeHtml(entry.period)}</div>
                    </div>
                    <ul class="history-list">
                        ${entry.bullets.map((bullet) => `<li>${escapeHtml(bullet)}</li>`).join("")}
                    </ul>
                </div>
            `).join("");

            appendBlock("line", `
                <div class="section-title">experience</div>
                <div class="history-list">${items}</div>
            `);
        }

        function renderProjects(detailIndex = null) {
            if (detailIndex !== null) {
                const project = profile.projects[detailIndex];
                if (!project) {
                    appendLine(`Project ${detailIndex + 1} not found. Use <span class="command-chip">projects</span> to list all entries.`, "line warn");
                    return;
                }

                appendBlock("line", `
                    <div class="section-title">project ${detailIndex + 1}</div>
                    <div class="project">
                        <div class="project-head">
                            <div class="project-name">${escapeHtml(project.name)}</div>
                            <div class="tag">${escapeHtml(project.tag)}</div>
                        </div>
                        <div class="project-meta">${escapeHtml(project.period)} · ${escapeHtml(project.employer)}</div>
                        <div class="project-desc" style="margin-top:0.5rem;">${escapeHtml(project.description)}</div>
                        <div class="tags">${project.stack.map((item) => `<span class="tag">${escapeHtml(item)}</span>`).join("")}</div>
                        ${project.link ? `<div style="margin-top:0.7rem;"><a class="project-link" href="${escapeHtml(project.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(project.link)}</a></div>` : ""}
                    </div>
                `);
                return;
            }

            const list = profile.projects.map((project, index) => `
                <div class="project">
                    <div class="project-head">
                        <div class="project-name">${index + 1}. ${escapeHtml(project.name)}</div>
                        <div class="tag">${escapeHtml(project.tag)}</div>
                    </div>
                    <div class="project-meta">${escapeHtml(project.period)} · ${escapeHtml(project.employer)}</div>
                    <div class="project-desc" style="margin-top:0.5rem;">${escapeHtml(project.description)}</div>
                    <div class="tags">${project.stack.map((item) => `<span class="tag">${escapeHtml(item)}</span>`).join("")}</div>
                    ${project.link ? `<div style="margin-top:0.7rem;"><a class="project-link" href="${escapeHtml(project.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(project.link)}</a></div>` : ""}
                </div>
            `).join("");

            appendBlock("line", `
                <div class="section-title">projects</div>
                <div class="project-list">${list}</div>
            `);
        }

        function renderEducation() {
            appendBlock("line", `
                <div class="section-title">education</div>
                <div class="cards">
                    <div class="card">
                        <div class="card-title">degree</div>
                        <div>${escapeHtml(profile.person.education)}</div>
                    </div>
                    <div class="card">
                        <div class="card-title">certifications</div>
                        <ul class="details-list">
                            ${profile.certifications.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
                        </ul>
                    </div>
                </div>
            `);
        }

        function renderResume() {
            appendBlock("line", `
                <div class="section-title">resume</div>
                <div class="split">
                    <div class="card">
                        <div class="card-title">contact</div>
                        <ul class="contact-list">
                            <li><span class="muted">phone:</span> ${escapeHtml(profile.person.phone)}</li>
                            <li><span class="muted">email:</span> <a class="contact-link" href="mailto:${escapeHtml(profile.person.email)}">${escapeHtml(profile.person.email)}</a></li>
                            <li><span class="muted">github:</span> <a class="contact-link" href="https://${escapeHtml(profile.person.github)}" target="_blank" rel="noopener noreferrer">${escapeHtml(profile.person.github)}</a></li>
                            <li><span class="muted">location:</span> ${escapeHtml(profile.person.location)}</li>
                        </ul>
                    </div>
                    <div class="card">
                        <div class="card-title">summary</div>
                        <div>${escapeHtml(profile.person.summary)}</div>
                    </div>
                </div>
                <div class="line muted" style="margin-top:0.8rem;">Resume details are presented inline; use <span class="command-chip">about</span>, <span class="command-chip">skills</span>, <span class="command-chip">experience</span>, and <span class="command-chip">projects</span> for sections.</div>
            `);
        }

        function renderContact() {
            appendBlock("line", `
                <div class="section-title">contact</div>
                <div class="cards">
                    <div class="card">
                        <div class="card-title">direct</div>
                        <ul class="contact-list">
                            <li><span class="muted">email:</span> <a class="contact-link" href="mailto:${escapeHtml(profile.person.email)}">${escapeHtml(profile.person.email)}</a></li>
                            <li><span class="muted">phone:</span> ${escapeHtml(profile.person.phone)}</li>
                            <li><span class="muted">github:</span> <a class="contact-link" href="https://${escapeHtml(profile.person.github)}" target="_blank" rel="noopener noreferrer">${escapeHtml(profile.person.github)}</a></li>
                        </ul>
                    </div>
                    <div class="card">
                        <div class="card-title">status</div>
                        <div>Open for software development opportunities, collaboration, and project work.</div>
                    </div>
                </div>
            `);
        }

        function renderClear() {
            output.innerHTML = "";
            renderIntro();
        }

        function toggleHackermode() {
            hackermode = !hackermode;
            terminal.classList.toggle("hackermode", hackermode);
            statusChip.textContent = hackermode ? "HACKER MODE" : "ONLINE";
            appendLine(hackermode ? "Hackermode activated." : "Hackermode deactivated.", "line danger");
        }

        function renderUnknown(command) {
            appendLine(`Unknown command: <span class="warn">${escapeHtml(command)}</span>. Type <span class="command-chip">help</span> for available commands.`, "line warn");
        }

        function executeCommand(rawValue) {
            const trimmed = rawValue.trim();

            if (!trimmed) {
                return;
            }

            appendLine(`<span class="prompt">${escapeHtml(profile.terminalPrompt)}</span> ${escapeHtml(trimmed)}`, "line green");

            const [head, ...rest] = trimmed.toLowerCase().split(/\s+/);
            const normalized = commandMap.get(head);

            if (!normalized) {
                if (head === "projects" && rest.length) {
                    const index = Number.parseInt(rest[0], 10);
                    if (Number.isFinite(index)) {
                        renderProjects(index - 1);
                        return;
                    }
                }
                renderUnknown(trimmed);
                return;
            }

            switch (normalized) {
                case "help":
                    renderHelp();
                    break;
                case "about":
                    renderAbout();
                    break;
                case "skills":
                    renderSkills();
                    break;
                case "experience":
                    renderExperience();
                    break;
                case "projects": {
                    if (rest.length) {
                        const index = Number.parseInt(rest[0], 10);
                        if (Number.isFinite(index)) {
                            renderProjects(index - 1);
                            break;
                        }
                    }
                    renderProjects();
                    break;
                }
                case "education":
                    renderEducation();
                    break;
                case "resume":
                    renderResume();
                    break;
                case "contact":
                    renderContact();
                    break;
                case "clear":
                    renderClear();
                    break;
                case "hackermode":
                    toggleHackermode();
                    break;
                case "sudo":
                    appendLine(profile.easterEggs.sudo, "line danger");
                    break;
                default:
                    renderUnknown(trimmed);
            }
        }

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            const value = input.value;
            if (!value.trim()) {
                return;
            }
            history.push(value);
            historyIndex = history.length;
            executeCommand(value);
            input.value = "";
            input.focus();
        });

        input.addEventListener("keydown", (event) => {
            if (event.key === "ArrowUp") {
                event.preventDefault();
                if (!history.length) {
                    return;
                }
                historyIndex = Math.max(0, historyIndex - 1);
                input.value = history[historyIndex] ?? "";
                queueMicrotask(() => input.setSelectionRange(input.value.length, input.value.length));
            }

            if (event.key === "ArrowDown") {
                event.preventDefault();
                if (!history.length) {
                    return;
                }
                historyIndex = Math.min(history.length, historyIndex + 1);
                input.value = history[historyIndex] ?? "";
                queueMicrotask(() => input.setSelectionRange(input.value.length, input.value.length));
            }
        });

        output.addEventListener("click", (event) => {
            const target = event.target instanceof Element ? event.target.closest("[data-command]") : null;
            if (!target) {
                return;
            }

            const command = target.getAttribute("data-command");
            if (!command) {
                return;
            }

            input.value = command;
            input.focus();
            form.requestSubmit();
        });

        function boot() {
            renderIntro();
            renderHelp();
            input.focus();
        }

        function resizeMatrix() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const dpr = Math.min(window.devicePixelRatio || 1, 2);

            matrixCanvas.width = Math.floor(width * dpr);
            matrixCanvas.height = Math.floor(height * dpr);
            matrixCanvas.style.width = `${width}px`;
            matrixCanvas.style.height = `${height}px`;
            matrixContext.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        const matrixState = {
            columns: [],
            fontSize: 18,
            chars: katakana
        };

        function initMatrix() {
            resizeMatrix();
            const columns = Math.ceil(window.innerWidth / matrixState.fontSize);
            matrixState.columns = Array.from({ length: columns }, () => ({
                y: Math.random() * window.innerHeight,
                speed: 0.7 + Math.random() * 1.9,
                length: 8 + Math.floor(Math.random() * 28),
                bright: Math.random() > 0.6
            }));
        }

        function drawMatrix() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            matrixContext.fillStyle = "rgba(0, 0, 0, 0.08)";
            matrixContext.fillRect(0, 0, width, height);

            matrixContext.font = `${matrixState.fontSize}px "JetBrains Mono", monospace`;
            matrixContext.textBaseline = "top";

            matrixState.columns.forEach((column, index) => {
                const x = index * matrixState.fontSize;
                column.y += column.speed;

                if (column.y > height + column.length * matrixState.fontSize) {
                    column.y = -Math.random() * height * 0.5;
                    column.speed = 0.7 + Math.random() * 1.9;
                    column.length = 8 + Math.floor(Math.random() * 28);
                    column.bright = Math.random() > 0.6;
                }

                for (let i = 0; i < column.length; i += 1) {
                    const y = column.y - i * matrixState.fontSize;
                    if (y < -matrixState.fontSize || y > height) {
                        continue;
                    }

                    const isHead = i === 0;
                    const alpha = Math.max(0.05, 1 - i / column.length);
                    matrixContext.fillStyle = isHead
                        ? `rgba(214, 255, 225, ${column.bright ? 1 : 0.8})`
                        : `rgba(51, 255, 94, ${alpha * 0.7})`;

                    const char = matrixState.chars[Math.floor(Math.random() * matrixState.chars.length)];
                    matrixContext.fillText(char, x, y);
                }
            });

            requestAnimationFrame(drawMatrix);
        }

        window.addEventListener("resize", () => {
            initMatrix();
        });

        document.addEventListener("keydown", () => {
            input.focus();
        });

        boot();
        initMatrix();
        drawMatrix();
    </script>
</body>
</html>
